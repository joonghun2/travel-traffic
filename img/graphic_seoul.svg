<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- No Background or Border -->
  
  <g filter="url(#glow)">
    <!-- Palace (Gyeongbokgung style) -->
    <path d="M400 700 L400 620 Q400 580 440 580 L560 580 Q600 580 600 620 L600 700" fill="none" stroke="#00f2fe" stroke-width="6" />
    <path d="M350 700 L650 700" fill="none" stroke="#00f2fe" stroke-width="4" />
    
    <!-- Lotte World Tower style -->
    <path d="M1200 700 L1240 100 L1280 100 L1320 700" fill="none" stroke="#4facfe" stroke-width="6" />
    <line x1="1260" y1="100" x2="1260" y2="700" stroke="#4facfe" stroke-width="2" opacity="0.6" />
    
    <!-- N Seoul Tower style -->
    <path d="M850 700 L870 450 L850 450 L850 430 L890 430 L890 450 L870 450" fill="none" stroke="#ff0844" stroke-width="6" />
    <circle cx="870" cy="400" r="25" fill="none" stroke="#ff0844" stroke-width="6" />
  </g>
  
  <!-- Text -->
  <text x="800" y="820" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-weight="900" font-size="80" filter="url(#glow)" opacity="0.9">SEOUL</text>
</svg>
