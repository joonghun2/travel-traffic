<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <!-- Japan Landmarks -->
  <g fill="none" stroke="#ff0844" stroke-width="2">
    <!-- Pagoda (Kyoto style) -->
    <path d="M300 800 L300 700 L500 700 L500 800 Z" />
    <path d="M280 700 L520 700 L400 650 Z" />
    <path d="M320 650 L480 650 L400 600 Z" />
    <path d="M350 600 L450 600 L400 550 Z" />
    <line x1="400" y1="550" x2="400" y2="500" stroke-width="3"/>

    <!-- Osaka Castle silhouete (distant) -->
    <path d="M1000 800 L1000 750 L1200 750 L1200 800" />
    <path d="M1020 750 L1180 750 L1100 700 Z" />
    <path d="M1050 700 L1150 700 L1100 670 Z" />
  </g>

  <!-- Sakura Petals -->
  <g fill="#ffc0cb" opacity="0.6">
    <ellipse cx="600" cy="200" rx="8" ry="4" transform="rotate(30 600 200)" />
    <ellipse cx="650" cy="250" rx="8" ry="4" transform="rotate(-15 650 250)" />
    <ellipse cx="700" cy="180" rx="8" ry="4" transform="rotate(45 700 180)" />
    <ellipse cx="800" cy="300" rx="8" ry="4" transform="rotate(10 800 300)" />
    <ellipse cx="850" cy="220" rx="8" ry="4" transform="rotate(-30 850 220)" />
    <ellipse cx="900" cy="400" rx="8" ry="4" transform="rotate(20 900 400)" />
    <ellipse cx="400" cy="350" rx="8" ry="4" transform="rotate(60 400 350)" />
    <ellipse cx="1200" cy="150" rx="8" ry="4" transform="rotate(-40 1200 150)" />
  </g>

  <!-- Distant Mountains -->
  <path d="M0 800 Q400 750 800 800 T1600 800" fill="none" stroke="#a0aec0" stroke-width="1" opacity="0.3" />
</svg>
