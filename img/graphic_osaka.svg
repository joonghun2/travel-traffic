<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Osaka Skyline -->
  <g fill="none" stroke-width="2" filter="url(#neon-glow)">
    <!-- Base Line -->
    <line x1="100" y1="800" x2="1500" y2="800" stroke="#00f2fe" />
    
    <!-- Glico Man / Neon Sign Concept (Ebisu Bridge area) -->
    <rect x="200" y="400" width="150" height="400" stroke="#00d2ff" />
    <path d="M220 500 L275 450 L330 500" stroke="#00d2ff" />
    <circle cx="275" cy="550" r="40" stroke="#00d2ff" />
    <path d="M240 650 L310 650" stroke="#00d2ff" />
    
    <!-- Osaka Castle Silhouette -->
    <path d="M700 800 L700 700 L900 700 L900 800 Z" stroke="#4facfe" />
    <path d="M680 700 L920 700 L800 640 Z" stroke="#4facfe" />
    <path d="M720 640 L880 640 L800 590 Z" stroke="#4facfe" />
    <path x="750" y="590" d="M750 590 L850 590 L800 550 Z" stroke="#4facfe" />
    <line x1="800" y1="550" x2="800" y2="520" stroke="#4facfe" />

    <!-- Umeda Sky Building Concept -->
    <path d="M1100 800 L1100 300 L1180 300 L1180 800" stroke="#00f2fe" />
    <path d="M1250 800 L1250 300 L1330 300 L1330 800" stroke="#00f2fe" />
    <path d="M1100 350 L1330 350" stroke="#00f2fe" />
    <circle cx="1215" cy="350" r="40" stroke="#00f2fe" />
    
    <!-- Abstract Tech Lines -->
    <path d="M100 150 Q500 250 900 100 T1500 200" stroke="#4facfe" stroke-dasharray="10 20" opacity="0.3" />
  </g>
</svg>
