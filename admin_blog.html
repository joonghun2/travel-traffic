<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Traffic - Blog Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #38bdf8;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(51, 65, 85, 0.5);
            --text: #f1f5f9;
            --text-muted: #94a3b8;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 2rem;
        }

        .container { max-width: 1000px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        h1 { font-family: 'Outfit', sans-serif; }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 0.5rem;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-secondary { background: #334155; color: #fff; }
        .btn-danger { background: #ef4444; color: #fff; }

        .editor-container {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 2rem;
        }

        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem; }
        select, input, textarea {
            width: 100%;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            padding: 0.8rem;
            color: #fff;
            border-radius: 0.4rem;
        }

        .content-blocks { margin: 2rem 0; border-top: 1px solid var(--border); padding-top: 2rem; }
        .block {
            background: rgba(15, 23, 42, 0.3);
            border: 1px dashed var(--border);
            padding: 1rem;
            margin-bottom: 1rem;
            position: relative;
            border-radius: 0.5rem;
        }
        .block-tools {
            position: absolute;
            top: 0.5rem; right: 0.5rem;
            display: flex; gap: 0.5rem;
        }
        .block-img-preview {
            max-width: 200px;
            margin-top: 1rem;
            border-radius: 0.5rem;
        }

        .add-tools {
            display: flex; gap: 1rem; justify-content: center; margin-top: 2rem;
        }

        .blog-item {
            background: var(--card-bg);
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            display: flex; justify-content: space-between; align-items: center;
        }

        /* Login Overlay */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .login-box {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 1.5rem;
            border: 1px solid var(--border);
            text-align: center;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .login-box h2 { margin-bottom: 2rem; font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body style="visibility: hidden;">
    <div id="login-overlay">
        <div class="login-box">
            <h2>Admin Login</h2>
            <div class="form-group" style="text-align: left;">
                <label>Enter Password</label>
                <input type="password" id="login-pass" placeholder="****" onkeypress="if(event.key==='Enter') attemptLogin()">
            </div>
            <button class="btn btn-primary" style="width: 100%;" onclick="attemptLogin()">Login</button>
            <p id="login-error" style="color: #ef4444; margin-top: 1rem; font-size: 0.875rem; display: none;">Invalid password</p>
        </div>
    </div>
    <div class="container" style="display: none;">
        <header>
            <h1>Blog Management</h1>
            <a href="admin.html" class="btn btn-secondary">Back to Dashboard</a>
        </header>

        <div class="editor-container" id="editor">
            <h2 id="editor-title" style="margin-bottom: 1.5rem;">Create/Edit Blog Post</h2>
            
            <div class="form-group">
                <label>Choose a Spot</label>
                <select id="spot-select">
                    <option value="">-- Choose a Spot --</option>
                </select>
            </div>

            <div class="form-group">
                <label>Blog Title</label>
                <input type="text" id="blog-title" placeholder="e.g., Hidden Gems in Hongdae">
            </div>

            <div id="blocks-container" class="content-blocks">
                <!-- Blocks will be added here -->
            </div>

            <div class="add-tools">
                <button class="btn btn-secondary" onclick="addBlock('text')">+ Add Text Block</button>
                <button class="btn btn-secondary" onclick="addBlock('image')">+ Add Image Block</button>
            </div>

            <div style="margin-top: 3rem; display: flex; gap: 1rem; justify-content: flex-end;">
                <button class="btn btn-primary" style="padding: 1rem 2rem;" onclick="saveBlog()">Save Blog Post</button>
            </div>
        </div>

        <div class="blog-list">
            <h2 style="margin-bottom: 1.5rem;">Existing Blog Posts</h2>
            <div id="existing-blogs">
                <!-- List will be populated -->
            </div>
        </div>
    </div>

    <script>
        let blogs = [];
        let spots = [];
        let currentEditId = null;

        function getAuthHeader() {
            return { 'X-Admin-Password': sessionStorage.getItem('admin_pass') || '' };
        }

        async function attemptLogin() {
            const pass = document.getElementById('login-pass').value;
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pass })
                });
                if (res.ok) {
                    sessionStorage.setItem('admin_pass', pass);
                    document.getElementById('login-overlay').style.display = 'none';
                    document.querySelector('.container').style.display = 'block';
                    document.body.style.visibility = 'visible';
                    init();
                } else {
                    const err = document.getElementById('login-error');
                    err.style.display = 'block';
                    setTimeout(() => err.style.display = 'none', 3000);
                }
            } catch (e) {
                alert('Connection error. Is the server running?');
            }
        }

        function checkAuth() {
            if (sessionStorage.getItem('admin_pass')) {
                document.getElementById('login-overlay').style.display = 'none';
                document.querySelector('.container').style.display = 'block';
                document.body.style.visibility = 'visible';
                init();
            } else {
                document.getElementById('login-overlay').style.display = 'flex';
                document.body.style.visibility = 'visible';
            }
        }

        async function init() {
            await fetchSpots();
            await fetchBlogs();
            renderBlogList();
        }

        async function fetchSpots() {
            try {
                const res = await fetch('/api/spots', { headers: getAuthHeader() });
                if (res.status === 401) {
                    sessionStorage.removeItem('admin_pass');
                    location.reload();
                    return;
                }
                
                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.error || `Server Error (${res.status})`);
                }
                
                spots = data;
                const select = document.getElementById('spot-select');
                select.innerHTML = '<option value="">-- Choose a Spot --</option>';
                spots.forEach(s => {
                    select.innerHTML += `<option value="${s.id}">${s.name} (${s.city}) (#${s.id})</option>`;
                });
            } catch (e) { 
                console.error(e);
                alert('Failed to fetch spots: ' + e.message);
            }
        }

        async function fetchBlogs() {
            try {
                const res = await fetch('/api/blogs', { headers: getAuthHeader() });
                if (res.status === 401) {
                    sessionStorage.removeItem('admin_pass');
                    location.reload();
                    return;
                }
                
                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.error || `Server Error (${res.status})`);
                }
                
                blogs = data;
            } catch (e) { 
                console.error(e);
                alert('Failed to fetch blogs: ' + e.message);
            }
        }

        function renderBlogList() {
            const container = document.getElementById('existing-blogs');
            container.innerHTML = blogs.length === 0 ? '<p style="color:var(--text-muted)">No blogs created yet.</p>' : '';
            blogs.forEach(b => {
                const spot = spots.find(s => s.id == b.spotId);
                const item = document.createElement('div');
                item.className = 'blog-item';
                item.innerHTML = `
                    <div>
                        <strong>${b.title}</strong><br>
                        <span style="font-size:0.8rem; color:var(--text-muted)">Spot: ${spot ? spot.name : 'Unknown'} (#${b.spotId})</span>
                    </div>
                    <div style="display:flex; gap:0.5rem;">
                        <button class="btn btn-secondary" onclick="editBlog('${b.id}')">Edit</button>
                        <button class="btn btn-danger" onclick="deleteBlog('${b.id}')">Delete</button>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function addBlock(type, value = '') {
            const container = document.getElementById('blocks-container');
            const blockDiv = document.createElement('div');
            blockDiv.className = 'block';
            blockDiv.dataset.type = type;

            const blockId = 'block-' + Date.now() + Math.random().toString(36).substr(2, 5);
            blockDiv.id = blockId;

            let html = `
                <div class="block-tools">
                    <button class="btn btn-secondary" style="padding:0.2rem 0.5rem;" onclick="moveBlock('${blockId}', -1)">↑</button>
                    <button class="btn btn-secondary" style="padding:0.2rem 0.5rem;" onclick="moveBlock('${blockId}', 1)">↓</button>
                    <button class="btn btn-danger" style="padding:0.2rem 0.5rem;" onclick="removeBlock('${blockId}')">×</button>
                </div>
                <label>${type === 'text' ? '📝 Text Content' : '🖼️ Image'}</label>
            `;

            if (type === 'text') {
                html += `<textarea rows="4">${value}</textarea>`;
            } else {
                html += `
                    <input type="file" accept="image/*" onchange="handleFileUpload(this, '${blockId}')">
                    <input type="hidden" class="img-url" value="${value}">
                    <img class="block-img-preview" src="${value || ''}" style="${value ? '' : 'display:none'}">
                `;
            }

            blockDiv.innerHTML = html;
            container.appendChild(blockDiv);
        }

        async function handleFileUpload(input, blockId) {
            if (!input.files || !input.files[0]) return;
            const file = input.files[0];
            const block = document.getElementById(blockId);
            
            // Show loading state
            const preview = block.querySelector('.block-img-preview');
            preview.style.display = 'block';
            preview.style.opacity = '0.5';

            try {
                const res = await fetch('/api/upload', {
                    method: 'POST',
                    headers: { 
                        'X-File-Name': file.name,
                        ...getAuthHeader()
                    },
                    body: file
                });
                const d = await res.json();
                if (d.url) {
                    block.querySelector('.img-url').value = d.url;
                    preview.src = d.url;
                    preview.style.opacity = '1';
                }
            } catch (e) { alert('Upload failed'); }
        }

        function removeBlock(id) { document.getElementById(id).remove(); }

        function moveBlock(id, dir) {
            const block = document.getElementById(id);
            if (dir === -1 && block.previousElementSibling) {
                block.parentNode.insertBefore(block, block.previousElementSibling);
            } else if (dir === 1 && block.nextElementSibling) {
                block.parentNode.insertBefore(block.nextElementSibling, block);
            }
        }

        function editBlog(id) {
            const b = blogs.find(x => x.id == id);
            if (!b) return;
            currentEditId = id;
            document.getElementById('editor-title').innerText = 'Editing Blog Post: ' + b.title;
            document.getElementById('spot-select').value = b.spotId;
            document.getElementById('blog-title').value = b.title;
            
            const container = document.getElementById('blocks-container');
            container.innerHTML = '';
            b.content.forEach(c => addBlock(c.type, c.value || c.url));
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function saveBlog() {
            const spotId = document.getElementById('spot-select').value;
            const title = document.getElementById('blog-title').value;
            if (!spotId || !title) return alert('Spot and Title are required');

            const blocks = [];
            document.querySelectorAll('.block').forEach(b => {
                const type = b.dataset.type;
                if (type === 'text') {
                    blocks.push({ type: 'text', value: b.querySelector('textarea').value });
                } else {
                    blocks.push({ type: 'image', url: b.querySelector('.img-url').value });
                }
            });

            const blogData = {
                id: currentEditId || 'blog-' + Date.now(),
                spotId: parseInt(spotId),
                title: title,
                content: blocks,
                author: 'Admin',
                createdAt: new Date().toISOString().split('T')[0]
            };

            if (currentEditId) {
                const idx = blogs.findIndex(x => x.id == currentEditId);
                if (idx !== -1) {
                    blogs[idx] = blogData;
                } else {
                    blogs.push(blogData);
                }
            } else {
                // Check if blog for this spot already exists
                const existingIdx = blogs.findIndex(x => x.spotId == spotId);
                if (existingIdx !== -1) {
                    if (!confirm('A blog for this spot already exists. Overwrite?')) return;
                    blogs[existingIdx] = blogData;
                } else {
                    blogs.push(blogData);
                }
            }

            try {
                const res = await fetch('/api/blogs', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        ...getAuthHeader()
                    },
                    body: JSON.stringify(blogs)
                });

                if (res.ok) {
                    alert('Saved successfully!');
                    resetEditor();
                    await fetchBlogs();
                    renderBlogList();
                } else {
                    let errorMessage = `Save failed (Status: ${res.status})`;
                    try {
                        const errData = await res.json();
                        errorMessage += `: ${errData.error || res.statusText}`;
                    } catch (e) {
                        errorMessage += `: ${res.statusText}`;
                    }
                    alert(errorMessage);
                }
            } catch (e) { 
                console.error(e);
                alert('Save failed: ' + e.message); 
            }
        }

        function resetEditor() {
            currentEditId = null;
            document.getElementById('editor-title').innerText = 'Create/Edit Blog Post';
            document.getElementById('spot-select').value = '';
            document.getElementById('blog-title').value = '';
            document.getElementById('blocks-container').innerHTML = '';
        }

        async function deleteBlog(id) {
            if (!confirm('Are you sure you want to delete this blog?')) return;
            try {
                const res = await fetch(`/api/blogs?id=${id}`, {
                    method: 'DELETE',
                    headers: getAuthHeader()
                });
                if (res.ok) {
                    await fetchBlogs();
                    renderBlogList();
                } else {
                    alert('Delete failed on server');
                }
            } catch (e) { alert('Delete failed: ' + e.message); }
        }

        checkAuth();
    </script>
</body>
</html>
