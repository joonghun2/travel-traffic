<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g filter="url(#glow)">
    <!-- Osaka Castle style -->
    <path d="M400 700 L400 600 L450 600 L450 500 L550 500 L550 400 L650 400 L650 500 L750 500 L750 600 L800 600 L800 700 Z" fill="none" stroke="#f093fb" stroke-width="8" />
    
    <!-- Glico Man hint -->
    <path d="M1100 700 L1150 600 L1100 500 M1200 700 L1150 600 L1200 500" fill="none" stroke="#4facfe" stroke-width="8" opacity="0.8" />
    
    <!-- Neon sign frames -->
    <rect x="200" y="300" width="80" height="300" rx="10" fill="none" stroke="#00f2fe" stroke-width="4" opacity="0.6" />
    <rect x="1300" y="350" width="100" height="250" rx="10" fill="none" stroke="#ff0844" stroke-width="4" opacity="0.6" />
  </g>
  
  <text x="800" y="820" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-weight="900" font-size="80" filter="url(#glow)" opacity="0.9">OSAKA</text>
</svg>
