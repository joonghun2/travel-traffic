<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g filter="url(#glow)">
    <!-- Hallasan Mountain -->
    <path d="M400 700 L800 250 L1200 700" fill="none" stroke="#00f2fe" stroke-width="12" stroke-linejoin="round" />
    <path d="M720 340 L880 340" fill="none" stroke="#ffffff" stroke-width="6" opacity="0.7" />
    
    <!-- Dol Hareubang Style Icon -->
    <rect x="1300" y="550" width="80" height="150" rx="40" fill="none" stroke="#f093fb" stroke-width="6" />
    <circle cx="1325" cy="600" r="10" fill="none" stroke="#f093fb" stroke-width="4" />
    <circle cx="1355" cy="600" r="10" fill="none" stroke="#f093fb" stroke-width="4" />
    
    <!-- Waves -->
    <path d="M200 750 Q500 680 800 750 T1400 750" fill="none" stroke="#00c6ff" stroke-width="8" opacity="0.8" />
  </g>
  
  <text x="800" y="850" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-weight="900" font-size="80" filter="url(#glow)" opacity="0.9">JEJU</text>
</svg>
