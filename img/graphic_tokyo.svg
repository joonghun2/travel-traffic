<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g filter="url(#glow)">
    <!-- Tokyo Tower -->
    <path d="M800 150 L650 700 L950 700 Z" fill="none" stroke="#ff0844" stroke-width="12" />
    <path d="M725 450 L875 450 M690 600 L910 600" stroke="#ff0844" stroke-width="6" />
    
    <!-- Skyscrapers -->
    <rect x="300" y="400" width="150" height="300" fill="none" stroke="#00f2fe" stroke-width="6" />
    <rect x="1150" y="450" width="180" height="250" fill="none" stroke="#4facfe" stroke-width="6" />
    
    <!-- Circle hint -->
    <circle cx="450" cy="350" r="50" fill="none" stroke="#f093fb" stroke-width="4" opacity="0.6" />
  </g>
  
  <text x="800" y="850" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-weight="900" font-size="80" filter="url(#glow)" opacity="0.9">TOKYO</text>
</svg>
