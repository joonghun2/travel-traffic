<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g filter="url(#glow)">
    <!-- Pagoda -->
    <g stroke="#764ba2" stroke-width="8" fill="none">
      <path d="M700 700 L900 700 L900 650 L700 650 Z" />
      <path d="M720 650 L880 650 L880 580 L720 580 Z" />
      <path d="M740 580 L860 580 L860 510 L740 510 Z" />
      <path d="M760 510 L840 510 L840 450 L760 450 Z" />
      <path d="M800 450 L800 380" />
    </g>
    
    <!-- Torii Gate -->
    <path d="M300 700 L300 450 M500 700 L500 450" stroke="#f093fb" stroke-width="12" />
    <path d="M250 450 L550 450 Q400 420 250 450" stroke="#f093fb" stroke-width="12" />
    <path d="M270 480 L530 480" stroke="#f093fb" stroke-width="12" />
    
    <!-- Rocks hint -->
    <ellipse cx="1200" cy="680" rx="80" ry="40" fill="none" stroke="#667eea" stroke-width="6" />
  </g>
  
  <text x="800" y="850" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-weight="900" font-size="80" filter="url(#glow)" opacity="0.9">KYOTO</text>
</svg>
