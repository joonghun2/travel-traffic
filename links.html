<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1c1c1c;
    --border: rgba(255,255,255,0.07);
    --text: #ffffff;
    --muted: #a0a0a0;
    --accent: #FF385C; /* Project Brand Color */
    --accent2: #e8d5a3;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* subtle noise texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 500px;
    margin: 0 auto;
    padding: 3rem 1.25rem 4rem;
  }

  /* header */
  .header {
    text-align: center;
    margin-bottom: 2.5rem;
    animation: fadeUp 0.6s ease both;
  }

  .logo {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    text-decoration: none;
  }

  .logo-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .logo-text {
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text);
  }

  .header h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.2;
    color: var(--text);
    margin-bottom: 10px;
  }

  .header p {
    font-size: 14px;
    color: var(--muted);
    font-weight: 500;
  }

  /* lang switcher */
  .lang-bar {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 2.5rem;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .lang-btn {
    font-family: 'Figtree', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .lang-btn.active, .lang-btn:hover {
    background: var(--surface2);
    color: var(--text);
    border-color: rgba(255,255,255,0.2);
  }

  /* section label */
  .section-label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
    animation: fadeUp 0.6s 0.15s ease both;
    text-align: center;
  }

  /* grid */
  .grid {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 3rem;
  }

  /* card */
  .card {
    position: relative;
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    text-decoration: none;
    display: flex;
    align-items: center;
    padding: 16px;
    border: 1px solid var(--border);
    transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), border-color 0.2s, background 0.2s;
    animation: fadeUp 0.5s ease both;
  }

  .card:hover {
    transform: translateY(-3px) scale(1.01);
    border-color: rgba(255,255,255,0.15);
    background: var(--surface2);
  }

  .card-art {
    width: 48px;
    height: 48px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    margin-right: 16px;
    flex-shrink: 0;
  }

  .card-body {
    flex: 1;
  }

  .card-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }

  .card-sub {
    font-size: 13px;
    color: var(--muted);
    font-weight: 400;
  }

  .arrow-icon {
    margin-left: 10px;
    color: var(--muted);
    transition: transform 0.2s;
  }

  .card:hover .arrow-icon {
    transform: translateX(4px);
    color: var(--text);
  }

  /* footer */
  .footer {
    text-align: center;
    font-size: 12px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.02em;
    animation: fadeUp 0.6s 0.4s ease both;
  }

  /* color themes per card */
  .art-map    { background: linear-gradient(135deg, #FF385C, #D70466); }
  .art-test   { background: linear-gradient(135deg, #6c1fa8, #1a0533); }
  .art-test2  { background: linear-gradient(135deg, #00f0ff, #0b0c10); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* stagger cards */
  .grid .card:nth-child(1) { animation-delay: 0.2s; }
  .grid .card:nth-child(2) { animation-delay: 0.28s; }

  /* mobile optimization */
  @media (max-width: 480px) {
    .header h1 { font-size: 24px; }
    .wrapper { padding-top: 2rem; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <header class="header">
    <a href="/" class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">CheckEastPoint</span>
    </a>
    <h1 id="headline"></h1>
    <p id="subheadline"></p>
  </header>

  <div class="lang-bar">
    <button class="lang-btn active" onclick="updateLang('ko')">한국어</button>
    <button class="lang-btn" onclick="updateLang('en')">English</button>
    <button class="lang-btn" onclick="updateLang('ja')">日本語</button>
  </div>

  <div class="section-label" id="section-label"></div>

  <main class="grid">

    <!-- 메인 사이트 (혼잡도 확인) -->
    <a class="card" href="/">
      <div class="card-img-wrap">
        <div class="card-art art-map">🗺️</div>
      </div>
      <div class="card-body">
        <div class="card-title" data-ko="실시간 여행지 혼잡도 확인" data-en="Live Crowd Tracker" data-ja="混雑リアルタイム確認"></div>
        <div class="card-sub" data-ko="서울 · 제주 · 교토 · 오사카" data-en="Seoul · Jeju · Kyoto · Osaka" data-ja="ソウル · 済州 · 京都 · 大阪"></div>
      </div>
      <div class="arrow-icon">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </div>
    </a>

    <!-- 이벤트 테스트 1 -->
    <a class="card" href="/event1/index.html">
      <div class="card-img-wrap">
        <div class="card-art art-test">✈️</div>
      </div>
      <div class="card-body">
        <div class="card-title" data-ko="여행 생존 유형 테스트" data-en="Travel Survival Type Test" data-ja="旅行サバイバル診断"></div>
        <div class="card-sub" data-ko="나도 몰랐던 나의 진짜 여행 자아" data-en="Discover your real travel self" data-ja="本当の旅行タイプを見つけよう"></div>
      </div>
      <div class="arrow-icon">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </div>
    </a>

    <!-- 이벤트 테스트 2 -->
    <a class="card" href="/event2/index.html">
      <div class="card-img-wrap">
        <div class="card-art art-test2">🌃</div>
      </div>
      <div class="card-body">
        <div class="card-title" data-ko="로컬 찐바이브 생존 테스트" data-en="The Local Survival Test" data-ja="ローカルサバイバル診断"></div>
        <div class="card-sub" data-ko="나는 어설픈 관광객? 현지인 뺨치는 프로?" data-en="Are you a tourist or a local boss?" data-ja="あなたは観光客？それとも地元民？"></div>
      </div>
      <div class="arrow-icon">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </div>
    </a>

  </main>

  <footer class="footer">
    <p>© 2026 CheckEastPoint. All rights reserved.</p>
  </footer>

</div>

<script>
  const translations = {
    headline: {
      ko: "지금 어디로 가?\n여기서 확인하세요",
      en: "Where to next?\nCheck it here.",
      ja: "次の旅先は？\nここで確認しよう"
    },
    subheadline: {
      ko: "실시간 혼잡도 · 여행 콘텐츠",
      en: "Live crowd data · Travel content",
      ja: "リアルタイム混雑 · 旅行コンテンツ"
    },
    label: {
      ko: "인기 서비스",
      en: "Popular Services",
      ja: "注目のサービス"
    }
  };

  function updateLang(lang) {
    // Update active button state
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.remove('active');
      if (btn.textContent.includes(lang === 'ko' ? '한국어' : lang === 'en' ? 'English' : '日本語')) {
        btn.classList.add('active');
      }
    });

    // Update headlines
    const h1 = document.getElementById('headline');
    h1.innerHTML = translations.headline[lang].replace('\n', '<br>');
    
    document.getElementById('subheadline').textContent = translations.subheadline[lang];
    document.getElementById('section-label').textContent = translations.label[lang];

    // Update data-attributed elements
    document.querySelectorAll('[data-' + lang + ']').forEach(el => {
      el.textContent = el.getAttribute('data-' + lang);
    });

    // Save language preference
    localStorage.setItem('preferred_lang', lang);
  }

  // Initial language detection
  const savedLang = localStorage.getItem('preferred_lang');
  const browserLang = navigator.language.split('-')[0];
  const initialLang = savedLang || (['ko', 'en', 'ja'].includes(browserLang) ? browserLang : 'ko');
  
  updateLang(initialLang);
</script>
</body>
</html>
