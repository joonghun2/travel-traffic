<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Kyoto Traditional Skyline -->
  <g fill="none" stroke-width="2" filter="url(#neon-glow)">
    <!-- Base Line -->
    <line x1="100" y1="800" x2="1500" y2="800" stroke="#ff0844" />
    
    <!-- Five-Story Pagoda (Yasaka Pagoda style) -->
    <g stroke="#ff0844">
      <path d="M400 800 L400 700 L550 700 L550 800 Z" stroke-width="3" />
      <path d="M380 700 L570 700 L475 660 Z" />
      
      <path d="M410 660 L410 600 L540 600 L540 660 Z" />
      <path d="M390 600 L560 600 L475 560 Z" />
      
      <path d="M420 560 L420 510 L530 510 L530 560 Z" />
      <path d="M400 510 L550 510 L475 470 Z" />
      
      <path d="M430 470 L430 430 L520 430 L520 470 Z" />
      <path d="M410 430 L540 430 L475 390 Z" />
      
      <path d="M440 390 L440 350 L510 350 L510 390 Z" />
      <path d="M420 350 L530 350 L475 310 Z" />
      
      <line x1="475" y1="310" x2="475" y2="250" stroke-width="4" />
    </g>

    <!-- Torii Gate Silhouette -->
    <g transform="translate(1000, 550)" stroke="#ff0844">
      <path d="M0 20 Q100 10 200 20" stroke-width="6" />
      <path d="M20 50 L180 50" stroke-width="4" />
      <line x1="60" y1="50" x2="60" y2="250" stroke-width="8" />
      <line x1="140" y1="50" x2="140" y2="250" stroke-width="8" />
      <line x1="60" y1="90" x2="140" y2="90" stroke-width="4" />
    </g>

    <!-- Sakura Blooms Abstract -->
    <g fill="#ffc0cb" stroke="none" opacity="0.6">
      <circle cx="800" cy="200" r="10" />
      <circle cx="850" cy="250" r="8" />
      <circle cx="750" cy="280" r="12" />
      <circle cx="1200" cy="150" r="10" />
      <circle cx="1150" cy="100" r="8" />
      <circle cx="1300" cy="300" r="10" />
      <circle cx="200" cy="300" r="15" />
      <circle cx="250" cy="220" r="10" />
    </g>
    
    <!-- Cloud Lines -->
    <path d="M100 200 C300 150 500 250 700 200 S1100 150 1400 250" stroke="#ff0844" stroke-dasharray="5 15" opacity="0.3" />
  </g>
</svg>
