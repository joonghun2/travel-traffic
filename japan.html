  {id:208,region:'kyoto',name:'교토 어소',area:'교토 카미교구',cat:'고궁',emoji:'🏯',base:20,peaks:[10,11,14],best:'예약 시간',tip:'황궁의 품격'},
  {id:209,region:'kyoto',name:'은각사',area:'교토 사쿄구',cat:'고궁',emoji:'🍃',base:40,peaks:[11,12,13,14],best:'오후 2시',tip:'모래 정원'},
];

const WMO_ICON={0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',51:'🌦️',61:'🌧️',71:'🌨️',80:'🌦️',95:'⛈️'};
const WMO_KEY={0:'weather.sunny',1:'weather.mostly_sunny',2:'weather.partly_cloudy',3:'weather.cloudy',45:'weather.foggy',51:'weather.drizzle',61:'weather.rainy',71:'weather.snowy',80:'weather.showers',95:'weather.thunderstorm'};
let wCode=null;

async function fetchWeather(lat, lng){
  try{
    const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,weathercode,windspeed_10m,relativehumidity_2m&timezone=Asia/Tokyo`);
    const d=await r.json();const c=d.current;wCode=c.weathercode;
    const wIcon = document.getElementById('wIcon');
    const wTemp = document.getElementById('wTemp');
    const wDetails = document.getElementById('wDetails');
    
    if(wIcon) wIcon.textContent=WMO_ICON[wCode]||'🌡️';
    if(wTemp) wTemp.textContent=`${Math.round(c.temperature_2m)}°C`;
    const wTxt = window.t(WMO_KEY[wCode], '');
    if(wDetails) wDetails.innerHTML=`<span style="margin-right:10px">💧 ${c.relativehumidity_2m}%</span><span style="margin-right:10px">💨 ${Math.round(c.windspeed_10m)}km/h</span><span>${wTxt}</span>`;
    applyFilter();
  }catch(e){
    if(document.getElementById('wTemp')) document.getElementById('wTemp').textContent=window.t('weather.error', 'Error');
  }
}

let currentRegion = 'osaka';
const REGION_COORDS = {
  osaka: { lat: 34.6937, lng: 135.5023 },
  kyoto: { lat: 35.0116, lng: 135.7681 }
};

function calc(p){
  const h=new Date().getHours();
  let s=p.base;
  if(p.peaks.includes(h)) s+=15; else if(h<8||h>22) s-=30;
  return Math.max(5,Math.min(99,Math.round(s)));
}

function applyFilter(){
  const searchInp = document.getElementById('searchInp');
  const q=searchInp.value.trim().toLowerCase();
  
  let list = PLACES.filter(p => p.region === currentRegion);
  if(q) {
      list=list.filter(p => {
          const tName = window.t(`spot.${p.id}.name`, p.name).toLowerCase();
          const tArea = window.t(`spot.${p.id}.area`, p.area).toLowerCase();
          return p.name.toLowerCase().includes(q) || 
                 p.area.toLowerCase().includes(q) || 
                 tName.includes(q) || 
                 tArea.includes(q);
      });
  }

  
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  
  if(list.length === 0) {
      grid.innerHTML = `<div class="no-results" style="grid-column: 1 / -1; text-align: center; color: var(--text-muted); padding: 3rem;">${window.t('cg.label.no_results')}</div>`;
      return;
  }

  list.forEach((p)=>{
    const cv=calc(p);
    let colorClass = (cv<40)?'relax':(cv<60)?'normal':(cv<80)?'crowded':'severe';

    const card=document.createElement('div');
    card.className=`cg-card`;
    card.innerHTML=`
      <div class="cg-header">
          <h3>${window.t(`spot.${p.id}.name`, p.name)}</h3>
          <span class="cg-badge ${colorClass}">${window.t((cv<40)?'cg.status.relaxed':(cv<60)?'cg.status.normal':(cv<80)?'cg.status.crowded':'cg.status.very_crowded')} ${cv}%</span>
      </div>
      <p class="cg-msg" style="margin-bottom: 8px;">📍 ${window.t(`spot.${p.id}.area`, p.area)} | ${window.t(`spot.${p.id}.cat`, p.cat)} ${p.emoji}</p>
      <p class="cg-msg" style="font-size: 0.85rem;">💡 ${window.t(`spot.${p.id}.tip`, p.tip)} <br/> ⏰ ${window.t("cg.label.rec_time")} ${window.t(`spot.${p.id}.best`, p.best)}</p>
      <div class="map-btns" style="margin-top: 15px; display: flex; gap: 8px; flex-wrap: wrap;">
        <a href="https://www.google.com/maps/search/${encodeURIComponent(window.t(`spot.${p.id}.name`, p.name))}" target="_blank" class="directions-btn" style="padding: 6px 12px; font-size: 0.8rem;">🗺️ ${window.t("cg.label.directions")} &rarr;</a>
        <a href="https://www.google.com/search?q=${encodeURIComponent(window.t(`spot.${p.id}.name`, p.name) + ' ' + window.t('cg.label.restaurant_query'))}" target="_blank" class="directions-btn" style="padding: 6px 12px; font-size: 0.8rem; border-color: #ffc107; color: #ffc107;">🍽️ ${window.t('card.btn.restaurants')}</a>
      </div>
    `;
    grid.appendChild(card);
  });
}

document.addEventListener('DOMContentLoaded', () => {
    const tabBtns = document.querySelectorAll('.tab-btn');
    tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            tabBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentRegion = btn.dataset.region;
            if(btn.dataset.bg) document.body.style.backgroundImage = `url('${btn.dataset.bg}')`;
            const coords = REGION_COORDS[currentRegion];
            fetchWeather(coords.lat, coords.lng);
            applyFilter();
        });
    });

    const initial = REGION_COORDS[currentRegion];
    fetchWeather(initial.lat, initial.lng);
    setTimeout(applyFilter, 100);
    document.getElementById('searchInp').addEventListener('input', applyFilter);
    window.addEventListener('languageChanged', applyFilter);
    setInterval(() => {
      const c = REGION_COORDS[currentRegion];
      fetchWeather(c.lat, c.lng);
    }, 600000);
});
</script>
