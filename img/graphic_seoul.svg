<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Seoul Skyline -->
  <g fill="none" stroke-width="2" filter="url(#neon-glow)">
    <!-- Base Line -->
    <line x1="100" y1="800" x2="1500" y2="800" stroke="#4facfe" />
    
    <!-- Lotte World Tower -->
    <path d="M1200 800 L1230 150 L1270 150 L1300 800 Z" stroke="#00f2fe" />
    <line x1="1250" y1="150" x2="1250" y2="800" stroke="#00f2fe" opacity="0.5"/>
    
    <!-- N Seoul Tower -->
    <path d="M800 800 L810 500 L800 500 L800 480 L820 480 L820 500 L810 500 Z" stroke="#ff0844" />
    <circle cx="810" cy="450" r="30" stroke="#ff0844" />
    <line x1="810" y1="420" x2="810" y2="380" stroke="#ff0844" />
    
    <!-- Gyeongbokgung/Building silhouettes -->
    <path d="M200 800 L200 700 L350 700 L350 800" stroke="#4facfe" />
    <path d="M400 800 L400 550 L550 550 L550 800" stroke="#4facfe" />
    <path d="M600 800 L600 650 L750 650 L750 800" stroke="#4facfe" />
    
    <!-- Abstract Tech Lines -->
    <path d="M100 200 Q400 150 700 300 T1400 100" stroke="#00f2fe" stroke-dasharray="5 10" opacity="0.3" />
  </g>
</svg>
