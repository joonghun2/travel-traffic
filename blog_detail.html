            margin-bottom: 15px;

        }
        .blog-meta {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .blog-content {

            color: var(--text-main);

        }
        .blog-content p {

        }
        .blog-content img {
            max-width: 100%;
            border-radius: 12px;
            margin: 30px 0;
            display: block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);

        /* Markdown Styles */
        .blog-content h2 { font-size: 1.8rem; margin-top: 2rem; margin-bottom: 1rem; color: var(--primary); }
        .blog-content h3 { font-size: 1.4rem; margin-top: 1.5rem; margin-bottom: 0.8rem; color: var(--secondary); }
        .blog-content hr { border: none; border-top: 1px solid var(--glass-border); margin: 2rem 0; }
        .blog-content ul { padding-left: 1.5rem; margin-bottom: 1.5rem; }
        .blog-content li { margin-bottom: 0.5rem; }
        .blog-content strong { color: var(--primary); font-weight: 700; }
        .blog-content table { 
            width: 100%; 
            border-collapse: collapse; 
            margin: 2rem 0; 
            background: var(--glass-bg); 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid var(--glass-border);
        }
        .blog-content th, .blog-content td { 
            padding: 1rem; 
            text-align: left; 
            border-bottom: 1px solid var(--glass-border); 
        }
        .blog-content th { background: rgba(255,255,255,0.1); font-weight: 700; color: var(--primary); }
        .blog-content tr:last-child td { border-bottom: none; }
        .no-blog {
            text-align: center;
            padding: 100px 20px;
            color: var(--text-muted);
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 30px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

<body class="blog-page">
    <nav>
        <a href="index.html" class="logo" data-i18n="nav.brand">트래블 트래픽</a>

                <option value="ko">한국어</option>

    <div class="blog-container" id="blog-container">
        <div class="loading" data-i18n="cg.label.loading">Loading...</div>
    </div>

    <footer class="site-footer">
        <div class="footer-content">
            <p>&copy; 2026 Travel Traffic. All rights reserved.</p>
        </div>
    </footer>

    <script>
        async function loadBlog() {
            const params = new URLSearchParams(window.location.search);
            const spotId = params.get('spotId');
            const container = document.getElementById('blog-container');

            if (!spotId) {
                container.innerHTML = '<div class="no-blog" data-i18n="blog.error.no_id">Invalid spot ID.</div>';
                return;
            }

            try {
                // In a real app, this would be a server-side fetch. 
                // Since this is a static site with an admin server, we fetch from our data file.
                // Note: In local static serving, we might need the admin server to serve this JSON.
                const response = await fetch('/api/blogs');
                if (!response.ok) throw new Error('Failed to fetch');
                
                const blogs = await response.json();
                
                // Get current language from localStorage or default to 'ko'
                const currentLang = localStorage.getItem('selectedLanguage') || 'ko';
                
                // Find blog that matches spotId AND language
                let blog = blogs.find(b => b.spotId == spotId && b.lang === currentLang);
                
                // Fallback: If no blog for current language, try 'ko'
                if (!blog && currentLang !== 'ko') {
                    blog = blogs.find(b => b.spotId == spotId && (b.lang === 'ko' || !b.lang));
                }

                if (!blog) {
                    container.innerHTML = `
                        <a href="javascript:history.back()" class="back-btn">&larr; ${window.t('blog.btn.back', 'Back')}</a>
                        <div class="no-blog">
                            <h2 data-i18n="blog.error.not_found">업데이트 예정</h2>
                        </div>`;
                    return;
                }

                renderBlog(blog);
            } catch (error) {
                console.error('Error loading blog:', error);
                container.innerHTML = `<div class="no-blog" data-i18n="blog.error.not_found">업데이트 예정</div>`;
            }
        }

        function renderBlog(blog) {
            const container = document.getElementById('blog-container');
            let contentHtml = '';
            
            blog.content.forEach(item => {
                if (item.type === 'text') {
                    // Use marked for markdown parsing
                    contentHtml += marked.parse(item.value);
                } else if (item.type === 'image') {
                    contentHtml += `<img src="${item.url}" alt="Blog Image">`;
                }
            });

            container.innerHTML = `
                <a href="javascript:history.back()" class="back-btn">&larr; ${window.t('blog.btn.back', 'Back')}</a>
                <article class="blog-post">
                    <header class="blog-header">
                        <h1 class="blog-title">${blog.title}</h1>
                        <div class="blog-meta">
                            <span class="blog-author">${blog.author || 'Admin'}</span> | 
                            <span class="blog-date">${blog.createdAt || ''}</span>
                        </div>
                    </header>
                    <div class="blog-content">
                        ${contentHtml}
                    </div>
                </article>
            `;
            
            // Re-apply translations if necessary, though mostly dynamic content here
            if (window.i18n && typeof window.i18n.updateContent === 'function') {
                window.i18n.updateContent();
            }
        }

        document.addEventListener('DOMContentLoaded', loadBlog);
    </script>
</body>
