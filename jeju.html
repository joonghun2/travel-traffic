<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Traffic - Jeju Island</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/i18n.js"></script>
    <script src="js/script.js" defer></script>
</head>
<body class="city-page" style="background-image: url('img/bg_jeju_hallasan.png');">

    <nav>
        <a href="index.html" class="logo" data-i18n="nav.brand">트래블 트래픽</a>
        <ul class="nav-links">
            <li><a href="index.html" data-i18n="nav.home">홈</a></li>
            <li><a href="seoul.html" data-i18n="nav.seoul">서울</a></li>
            <li><a href="jeju.html" data-i18n="nav.jeju" class="active">제주</a></li>
            <li><a href="japan.html" data-i18n="nav.japan">일본(오사카&교토)</a></li>
        </ul>
        <div class="lang-switcher">
            <select id="lang-selector">
                <option value="ko">한국어</option>
                <option value="en">English</option>
                <option value="ja">日本語</option>
            </select>
        </div>
    </nav>

    <header class="page-header">
        <h1 data-i18n="jeju.header.title">제주도</h1>
        <p data-i18n="jeju.header.desc">화산섬의 파라다이스</p>
        <div style="margin-top:20px; font-family:'DM Mono', monospace; color:var(--accent);">
            <span id="wIcon">⏳</span> <span id="wTemp" style="font-weight:900;">···</span>
            <div id="wDetails" style="font-size:12px; margin-top:5px; color:var(--text-muted);"></div>
        </div>
    </header>

    <section class="content-section congestion-dashboard" style="background:transparent; border:none; box-shadow:none; padding:0;">
        <div class="search-bar">
            <input type="text" id="searchInp" placeholder="장소 검색" data-i18n="jeju.search.placeholder">
        </div>


        <div class="cg-grid" id="grid">
            <div class="loading" data-i18n="cg.label.loading">Loading...</div>
        </div>
    </section>

<script>
const PLACES=[
  {id:10,name:'한라산 국립공원',area:'제주 중심부',cat:'자연·공원',emoji:'⛰️',lat:33.3617,lng:126.5332,base:30,peaks:[8,9,10,11],best:'새벽 6시',tip:'등산화 필수'},
  {id:11,name:'성산 일출봉',area:'성산읍',cat:'자연·공원',emoji:'🌅',lat:33.4585,lng:126.9421,base:45,peaks:[6,7,11,12],best:'일출 전',tip:'최고의 일출'},
  {id:12,name:'만장굴',area:'구좌읍',cat:'자연·공원',emoji:'🦇',lat:33.5284,lng:126.7716,base:35,peaks:[12,13,14,15],best:'오후 2시',tip:'겉옷 필수'},
  {id:13,name:'정방폭포',area:'서귀포시',cat:'자연·공원',emoji:'🌊',lat:33.2448,lng:126.5718,base:40,peaks:[11,12,14,15],best:'오전 10시',tip:'동양 유일의 해안 폭포'},
  {id:14,name:'함덕 해수욕장',area:'조천읍',cat:'자연·공원',emoji:'🏖️',lat:33.5430,lng:126.6692,base:60,peaks:[13,14,15,16,17],best:'만조 시',tip:'에메랄드빛 바다'},
  {id:15,name:'오설록 티 뮤지엄',area:'안덕면',cat:'박물관',emoji:'🍵',lat:33.3056,lng:126.2894,base:70,peaks:[13,14,15,16],best:'평일 오후',tip:'녹차 아이스크림'},
  {id:50,name:'우도',area:'우도면',cat:'자연·공원',emoji:'⛴️',lat:33.5115,lng:126.9538,base:40,peaks:[11,12,13,14],best:'오전 배',tip:'섬 속의 섬'},
  {id:51,name:'주상절리대',area:'중문',cat:'자연·공원',emoji:'🗿',lat:33.2384,lng:126.4259,base:45,peaks:[11,12,14,15],best:'파도 센 날',tip:'화산석의 신비'},
  {id:52,name:'비자림',area:'구좌읍',cat:'자연·공원',emoji:'🌲',lat:33.4912,lng:126.7725,base:30,peaks:[10,11,14,15],best:'비 온 후',tip:'천년의 숲'},
  {id:53,name:'카멜리아 힐',area:'안덕면',cat:'자연·공원',emoji:'🌺',lat:33.2842,lng:126.3703,base:35,peaks:[11,12,14],best:'꽃 개화기',tip:'인생샷 명소'},
  {id:54,name:'월정리 해변',area:'구좌읍',cat:'자연·공원',emoji:'⛱️',lat:33.5532,lng:126.7932,base:55,peaks:[16,17,18],best:'해질녘',tip:'카페 거리'},
  {id:55,name:'천지연 폭포',area:'서귀포시',cat:'자연·공원',emoji:'🌊',lat:33.2458,lng:126.5593,base:50,peaks:[19,20,21],best:'밤 산책',tip:'야간 조명 폭포'},
  {id:56,name:'협재 해수욕장',area:'한림읍',cat:'자연·공원',emoji:'🏝️',lat:33.3938,lng:126.2393,base:65,peaks:[14,15,16,17],best:'물 빠질 때',tip:'맑은 바다'},
  {id:57,name:'약천사',area:'대포동',cat:'박물관',emoji:'🏯',lat:33.2435,lng:126.4485,base:25,peaks:[10,11,14],best:'낮 시간',tip:'웅장한 법당'},
  {id:58,name:'생각하는 정원',area:'한경면',cat:'자연·공원',emoji:'🌳',lat:33.3245,lng:126.2541,base:20,peaks:[11,12,14],best:'낮',tip:'분수와 정원'},
  {id:59,name:'에코랜드',area:'조천읍',cat:'테마파크',emoji:'🚂',base:45,peaks:[11,12,14,15],best:'가족과 함께',tip:'숲 속 기차'},
];

const WMO_ICON={0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',51:'🌦️',61:'🌧️',71:'🌨️',80:'🌦️',95:'⛈️'};
const WMO_KEY={0:'weather.sunny',1:'weather.mostly_sunny',2:'weather.partly_cloudy',3:'weather.cloudy',45:'weather.foggy',51:'weather.drizzle',61:'weather.rainy',71:'weather.snowy',80:'weather.showers',95:'weather.thunderstorm'};
let wCode=null;

async function fetchWeather(){
  try{
    const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=33.4996&longitude=126.5312&current=temperature_2m,weathercode,windspeed_10m,relativehumidity_2m&timezone=Asia/Seoul');
    const d=await r.json();const c=d.current;wCode=c.weathercode;
    const wIcon = document.getElementById('wIcon');
    const wTemp = document.getElementById('wTemp');
    const wDetails = document.getElementById('wDetails');
    
    if(wIcon) wIcon.textContent=WMO_ICON[wCode]||'🌡️';
    if(wTemp) wTemp.textContent=`${Math.round(c.temperature_2m)}°C`;
    const wTxt = window.t(WMO_KEY[wCode], '');
    if(wDetails) wDetails.innerHTML=`<span style="margin-right:10px">💧 ${c.relativehumidity_2m}%</span><span style="margin-right:10px">💨 ${Math.round(c.windspeed_10m)}km/h</span><span>${wTxt}</span>`;
    applyFilter();
  }catch(e){
    if(document.getElementById('wTemp')) document.getElementById('wTemp').textContent=window.t('weather.error', 'Error');
  }
}

function calc(p){
  const h=new Date().getHours(),day=new Date().getDay();
  let s=p.base;
  if(p.peaks.includes(h))s+=15; else if(h<8||h>20)s-=25;
  if(day===0||day===6)s+=10;
  return Math.max(5,Math.min(99,Math.round(s)));
}

function applyFilter(){
  const searchInp = document.getElementById('searchInp');
  const q=searchInp.value.trim().toLowerCase();
  let list=PLACES;
  if(q) list=list.filter(p=>p.name.includes(q)||p.area.includes(q));

  
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  
  if(list.length === 0) {
      grid.innerHTML = `<div class="no-results" style="grid-column: 1 / -1; text-align: center; color: var(--text-muted); padding: 3rem;">${window.t('cg.label.no_results', 'No results')}</div>`;
      return;
  }

  list.forEach((p)=>{
    const cv=calc(p);
    let colorClass = (cv<40)?'relax':(cv<60)?'normal':(cv<80)?'crowded':'severe';
    let statusKey = (cv<40)?'cg.status.relaxed':(cv<60)?'cg.status.normal':(cv<80)?'cg.status.crowded':'cg.status.very_crowded';

    const card=document.createElement('div');
    card.className=`cg-card`;
    card.innerHTML=`
      <div class="cg-header">
          <h3>${window.t(`spot.${p.id}.name`, p.name)}</h3>
          <span class="cg-badge ${colorClass}">${window.t(statusKey)} ${cv}%</span>
      </div>
      <p class="cg-msg" style="margin-bottom: 8px;">📍 ${window.t(`spot.${p.id}.area`, p.area)} | ${window.t(`spot.${p.id}.cat`, p.cat)} ${p.emoji}</p>
      <p class="cg-msg" style="font-size: 0.85rem;">💡 ${window.t(`spot.${p.id}.tip`, p.tip)} <br/> ⏰ ${window.t("cg.label.rec_time")} ${window.t(`spot.${p.id}.best`, p.best)}</p>
      <div class="map-btns" style="margin-top: 15px; display: flex; gap: 8px; flex-wrap: wrap;">
        <a href="https://map.naver.com/p/search/${encodeURIComponent(p.name)}" target="_blank" class="directions-btn" style="padding: 6px 12px; font-size: 0.8rem;">🗺️ ${window.t('cg.label.naver')}</a>
        <a href="https://www.google.com/maps/search/${encodeURIComponent(p.name)}" target="_blank" class="directions-btn" style="padding: 6px 12px; font-size: 0.8rem;">🌐 ${window.t('cg.label.google')}</a>
      </div>
    `;
    grid.appendChild(card);
  });
}

document.addEventListener('DOMContentLoaded', () => {
    fetchWeather();
    setTimeout(applyFilter, 100);
    document.getElementById('searchInp').addEventListener('input', applyFilter);
    window.addEventListener('languageChanged', applyFilter);
    setInterval(fetchWeather, 600000);
});
</script>

</body>
</html>
