    <style>
        :root {
            --primary: #38bdf8;
            --secondary: #818cf8;
            --accent: #fb7185;
            --bg-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        .blog-container {
            max-width: 900px;
            margin: 120px auto 80px;
            padding: 0 5%;
        }

        .blog-header {
            margin-bottom: 60px;
            text-align: center;
        }

        .blog-title {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 900;
            color: #fff;
            margin-bottom: 20px;
            line-height: 1.1;
            letter-spacing: -0.03em;
        }

        .blog-meta {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            color: var(--text-muted);
            font-size: 1rem;
        }

        .blog-author-tag {
            background: var(--glass-bg);
            padding: 0.4rem 1.2rem;
            border-radius: 2rem;
            border: 1px solid var(--glass-border);
            color: var(--primary);
            font-weight: 600;
        }

        .blog-content {
            line-height: 1.8;
            color: #e2e8f0;
            font-size: 1.15rem;
        }

        /* SEO & GEO FAQ Styling */
        .blog-content h2, .blog-content h3 {
            position: relative;
            font-size: 2rem;
            margin: 4rem 0 1.5rem;
            color: #fff;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .blog-content h2::before {
            content: 'Q.';
            position: absolute;
            left: -3rem;
            color: var(--primary);
            font-size: 2.5rem;
            opacity: 0.3;
        }

        /* Inverted Pyramid Answer Styling */
        .faq-answer {
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.1) 0%, transparent 100%);
            border-left: 4px solid var(--primary);
            padding: 2rem;
            border-radius: 0 1.5rem 1.5rem 0;
            margin-bottom: 2.5rem;
            font-size: 1.25rem;
            font-weight: 500;
            color: #fff;
        }

        .blog-content p {
            margin-bottom: 2rem;
        }

        .blog-content img {
            width: 100%;
            border-radius: 2rem;
            margin: 4rem 0;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--text-muted);
            text-decoration: none;
            margin-bottom: 3rem;
            font-weight: 500;
            transition: 0.3s;
        }
        .back-btn:hover { color: var(--primary); transform: translateX(-5px); }

        @media (max-width: 768px) {
            .blog-content h2::before { display: none; }
            .faq-answer { padding: 1.5rem; font-size: 1.1rem; }
        }

    <script>
        async function loadBlog() {
            const params = new URLSearchParams(window.location.search);
            const spotId = params.get('spotId');
            const container = document.getElementById('blog-container');

            if (!spotId) {
                container.innerHTML = '<div class="no-blog" data-i18n="blog.error.no_id">Invalid spot ID.</div>';
                return;
            }

            try {
                const response = await fetch('/api/blogs');
                if (!response.ok) throw new Error('Failed to fetch');
                
                const blogs = await response.json();
                const currentLang = localStorage.getItem('selectedLanguage') || 'ko';
                
                let blog = blogs.find(b => b.spotId == spotId && b.lang === currentLang);
                if (!blog && currentLang !== 'ko') {
                    blog = blogs.find(b => b.spotId == spotId && (b.lang === 'ko' || !b.lang));
                }

                if (!blog) {
                    container.innerHTML = `
                        <a href="javascript:history.back()" class="back-btn">&larr; ${window.t('blog.btn.back', 'Back')}</a>
                        <div class="no-blog">
                            <h2 data-i18n="blog.error.not_found">업데이트 예정</h2>
                        </div>`;
                    return;
                }

                renderBlog(blog);
                generateSchema(blog);
            } catch (error) {
                console.error('Error loading blog:', error);
                container.innerHTML = `<div class="no-blog" data-i18n="blog.error.not_found">업데이트 예정</div>`;
            }
        }

        function renderBlog(blog) {
            const container = document.getElementById('blog-container');
            let contentHtml = '';
            
            blog.content.forEach(item => {
                if (item.type === 'text') {
                    const parsedHtml = marked.parse(item.value);
                    
                    // SEO & GEO Architecture: Wrap first paragraph after H2/H3 as a "FAQ Answer" (Inverted Pyramid)
                    // We use regex to identify headings and style subsequent paragraphs
                    const faqMappedHtml = parsedHtml.replace(/<(h[23])>(.*?)<\/\1>\s*<p>(.*?)<\/p>/gs, (match, tag, title, firstPara) => {
                        return `<${tag}>${title}</${tag}><div class="faq-answer">${firstPara}</div>`;
                    });
                    
                    contentHtml += faqMappedHtml;
                } else if (item.type === 'image') {
                    contentHtml += `<img src="${item.url}" alt="${blog.title}">`;
                }
            });

            container.innerHTML = `
                <a href="javascript:history.back()" class="back-btn">&larr; ${window.t('blog.btn.back', 'Back')}</a>
                <article class="blog-post">
                    <header class="blog-header">
                        <h1 class="blog-title">${blog.title}</h1>
                        <div class="blog-meta">
                            <span class="blog-author-tag">${blog.author || 'Travel Traffic Editor'}</span>
                            <span>${blog.createdAt || 'RECENT POST'}</span>
                        </div>
                    </header>
                    <div class="blog-content">
                        ${contentHtml}
                    </div>
                </article>
            `;
            
            if (window.i18n && typeof window.i18n.updateContent === 'function') {
                window.i18n.updateContent();
            }
        }

        function generateSchema(blog) {
            const faqs = [];
            let currentText = '';
            
            // Extract questions and answers for FAQ schema
            blog.content.forEach(item => {
                if (item.type === 'text') currentText += item.value;
            });

            // Match headings and first paragraphs for schema
            const matches = [...currentText.matchAll(/##\s+(.*?)\n+(.*?)\n/g)];
            matches.forEach(match => {
                faqs.push({
                    "@type": "Question",
                    "name": match[1].trim(),
                    "acceptedAnswer": {
                        "@type": "Answer",
                        "text": match[2].trim()
                    }
                });
            });

            const schema = {
                "@context": "https://schema.org",
                "@graph": [
                    {
                        "@type": "Article",
                        "headline": blog.title,
                        "author": {
                            "@type": "Person",
                            "name": blog.author || "Travel Traffic Editor"
                        },
                        "datePublished": blog.createdAt,
                        "image": blog.content.find(c => c.type === 'image')?.url || "https://www.checkeastpoint.com/img/bg_seoul_gwanghwamun.png"
                    }
                ]
            };

            if (faqs.length > 0) {
                schema["@graph"].push({
                    "@type": "FAQPage",
                    "mainEntity": faqs
                });
            }

            const script = document.createElement('script');
            script.type = 'application/ld+json';
            script.text = JSON.stringify(schema);
            document.head.appendChild(script);
        }

        document.addEventListener('DOMContentLoaded', loadBlog);
    </script>
