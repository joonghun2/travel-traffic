    <script>
        function createFaqItem(qKey, aKey, index) {
            const num = String(index + 1).padStart(2, '0');
            return `
                <div class="faq-ac-item">
                    <button class="faq-ac-btn">
                        <div class="faq-ac-num">${num}</div>
                        <div class="faq-ac-q" data-i18n="${qKey}">...</div>
                        <div class="faq-ac-icon">＋</div>
                    </button>
                    <div class="faq-ac-body">
                        <div class="faq-ac-inner" data-i18n="${aKey}">...</div>
                    </div>
                </div>
            `;
        }

        // Generate Korea FAQs
        const krContainer = document.getElementById('faq-korea');
        let krHtml = '';
        for(let i=1; i<=10; i++) {
            krHtml += createFaqItem(`faq.ko.q${i}`, `faq.ko.a${i}`, i-1);
        }
        krContainer.innerHTML = krHtml;

        // Generate Japan FAQs
        const jpContainer = document.getElementById('faq-japan');
        let jpHtml = '';
        for(let i=1; i<=10; i++) {
            jpHtml += createFaqItem(`faq.jp.q${i}`, `faq.jp.a${i}`, i-1);
        }
        jpContainer.innerHTML = jpHtml;

        // Bind Accordion Events
        document.querySelectorAll('.faq-ac-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const item = btn.parentElement;
                const isOpen = item.classList.contains('open');
                
                // Close all currently open items within the same container
                const container = item.parentElement;
                container.querySelectorAll('.faq-ac-item.open').forEach(openItem => {
                    openItem.classList.remove('open');
                });

                if (!isOpen) {
                    item.classList.add('open');
                }
            });
        });

        // Bind Tab Events
        document.querySelectorAll('.faq-tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.faq-tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.faq-ac-content').forEach(c => c.classList.remove('active'));
                
                btn.classList.add('active');
                document.getElementById(btn.getAttribute('data-target')).classList.add('active');
            });
        });

        // Dynamic Schema for FAQPage
        function updateFaqPageSchema() {
            const scripts = document.querySelectorAll('script[type="application/ld+json"]');
            scripts.forEach(script => {
                try {
                    const data = JSON.parse(script.innerHTML);
                    if (data['@type'] === 'FAQPage') {
                        let entities = [];
                        for(let i=1; i<=10; i++) {
                            // Korea
                            entities.push({
                                "@type": "Question",
                                "name": window.t(`faq.ko.q${i}`),
                                "acceptedAnswer": {
                                    "@type": "Answer",
                                    "text": window.t(`faq.ko.a${i}`)
                                }
                            });
                            // Japan
                            entities.push({
                                "@type": "Question",
                                "name": window.t(`faq.jp.q${i}`),
                                "acceptedAnswer": {
                                    "@type": "Answer",
                                    "text": window.t(`faq.jp.a${i}`)
                                }
                            });
                        }
                        data.mainEntity = entities;
                        script.innerHTML = JSON.stringify(data, null, 2);
                    }
                } catch(e) { console.error('FAQ Schema Update Error:', e); }
            });
        }

        window.addEventListener('languageChanged', () => {
            updateFaqPageSchema();
            // Update the page title and meta description tag
            document.title = window.t('faq.page.title') + " | Travel Traffic";
            const metaDesc = document.querySelector('meta[name="description"]');
            if (metaDesc) {
                metaDesc.setAttribute("content", window.t('faq.page.desc'));
            }
        });
        window.addEventListener('load', updateFaqPageSchema);
    </script>
