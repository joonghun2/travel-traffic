<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Traffic - Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #38bdf8;
            --primary-glow: rgba(56, 189, 248, 0.4);
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(51, 65, 85, 0.5);
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Ambient Background */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 10%, rgba(56, 189, 248, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 90% 90%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            width: 100%;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            background: linear-gradient(135deg, #fff 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.875rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--success);
        }

        /* Grid View */
        .guides-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .guide-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .guide-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px -10px var(--primary-glow);
        }

        .guide-card h3 {
            font-size: 1.125rem;
            margin-bottom: 0.75rem;
            color: #fff;
        }

        .guide-card p {
            font-size: 0.875rem;
            color: var(--text-muted);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .guide-card .id-tag {
            position: absolute;
            top: 1rem; right: 1rem;
            font-size: 0.75rem;
            color: var(--primary);
            font-weight: 700;
            opacity: 0.5;
        }

        /* Editor Modal */
        #editor-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 2rem;
        }

        .editor {
            background: #1e293b;
            width: 100%;
            max-width: 900px;
            max-height: 90vh;
            border-radius: 1.5rem;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .editor-header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .editor-tabs {
            display: flex;
            background: rgba(15, 23, 42, 0.5);
            padding: 0.25rem;
            border-radius: 0.75rem;
            margin: 1.5rem 2rem 0;
        }

        .tab-btn {
            flex: 1;
            padding: 0.75rem;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-weight: 600;
            cursor: pointer;
            border-radius: 0.5rem;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: #0f172a;
        }

        .editor-body {
            padding: 2rem;
            overflow-y: auto;
            flex-grow: 1;
        }

        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.875rem; font-weight: 600; color: var(--text-muted); }
        input, textarea {
            width: 100%;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            color: #fff;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        input:focus, textarea:focus { outline: none; border-color: var(--primary); }
        textarea { min-height: 120px; line-height: 1.6; }

        .editor-footer {
            padding: 1.5rem 2rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-primary { background: var(--primary); color: #0f172a; }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--primary-glow); }
        .btn-secondary { background: rgba(51, 65, 85, 0.5); color: #fff; }
        
        .btn-add {
            background: linear-gradient(135deg, var(--primary) 0%, #0ea5e9 100%);
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.2);
        }
        .btn-add:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(56, 189, 248, 0.3); }

        #toast {
            position: fixed;
            bottom: 2rem; right: 2rem;
            background: var(--success);
            color: #fff;
            padding: 1rem 2rem;
            border-radius: 1rem;
            transform: translateY(200%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            font-weight: 600;
        }
        #toast.show { transform: translateY(0); }

        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--text-muted);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Admin Dashboard</h1>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <button class="btn btn-add" onclick="openEditor('new')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    Create New Guide
                </button>
                <a href="admin_blog.html" class="btn btn-secondary" style="text-decoration: none; display: flex; align-items: center; gap: 0.5rem;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                    Blog Management
                </a>
                <div class="status-badge">
                    <div class="status-dot"></div>
                    Live Connection
                </div>
            </div>
        </header>

        <div id="guides-grid" class="guides-grid">
            <div class="loading">Loading your travel guides...</div>
        </div>
    </div>

    <div id="editor-overlay">
        <div class="editor">
            <div class="editor-header">
                <h2 id="editor-title">Edit Guide</h2>
                <button class="btn btn-secondary" onclick="closeEditor()">Close</button>
            </div>
            
            <div class="editor-tabs">
                <button class="tab-btn active" onclick="switchLang('ko')">Korean</button>
                <button class="tab-btn" onclick="switchLang('en')">English</button>
                <button class="tab-btn" onclick="switchLang('ja')">Japanese</button>
            </div>

            <div class="editor-body">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="edit-title">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input id="edit-desc">
                </div>
                <div class="form-group">
                    <label>Tags (Comma separated)</label>
                    <input type="text" id="edit-tags">
                </div>
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="text" id="edit-image" placeholder="https://example.com/image.jpg">
                </div>
                <div class="form-group">
                    <label>Content</label>
                    <textarea id="edit-content"></textarea>
                </div>
            </div>

            <div class="editor-footer">
                <button class="btn btn-secondary" onclick="closeEditor()">Cancel</button>
                <button class="btn btn-primary" onclick="saveGuide()">Save Changes</button>
            </div>
        </div>
    </div>

    <div id="toast">Changes saved & Guides updated!</div>

    <script>
        let guidesData = [];
        let currentGuideId = null;
        let currentLang = 'ko';

        async function fetchGuides() {
            try {
                const res = await fetch('/api/guides');
                guidesData = await res.json();
                renderGrid();
            } catch (e) {
                console.error('Fetch error:', e);
            }
        }

        function renderGrid() {
            const grid = document.getElementById('guides-grid');
            grid.innerHTML = '';
            guidesData.forEach(guide => {
                const card = document.createElement('div');
                card.className = 'guide-card';
                card.onclick = () => openEditor(guide.id);
                card.innerHTML = `
                    <div class="id-tag">#G${guide.id}</div>
                    <h3>${guide.ko.title}</h3>
                    <p>${guide.ko.desc}</p>
                `;
                grid.appendChild(card);
            });
        }

        function openEditor(id) {
            currentGuideId = id;
            if (id === 'new') {
                const nextId = guidesData.length > 0 ? Math.max(...guidesData.map(g => g.id)) + 1 : 1;
                const newGuide = {
                    id: nextId,
                    tags: ["#New"],
                    ko: { title: "", desc: "", content: "" },
                    en: { title: "", desc: "", content: "" },
                    ja: { title: "", desc: "", content: "" }
                };
                // Store a temporary copy or just push it later
                document.getElementById('editor-title').innerText = `Create New Guide #${nextId}`;
                // Set default values in UI
                resetForm(newGuide);
            } else {
                const guide = guidesData.find(g => g.id === id);
                document.getElementById('editor-title').innerText = `Editing Guide #${id}`;
                switchLang('ko');
            }
            document.getElementById('editor-overlay').style.display = 'flex';
        }

        function resetForm(guide) {
            // Helper to fill UI for currentLang
            currentLang = 'ko';
            updateUIWithGuide(guide);
        }

        function updateUIWithGuide(guide) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase() === (currentLang === 'ko' ? 'korean' : (currentLang === 'en' ? 'english' : 'japanese')));
            });
            document.getElementById('edit-title').value = guide[currentLang].title || '';
            document.getElementById('edit-desc').value = guide[currentLang].desc || '';
            document.getElementById('edit-image').value = guide[currentLang].image || '';
            document.getElementById('edit-content').value = guide[currentLang].content || '';
            
            // Check if language-specific tags exist, else fallback to global tags
            const tags = guide[currentLang].tags || guide.tags || [];
            document.getElementById('edit-tags').value = tags.join(', ');
        }

        function closeEditor() {
            document.getElementById('editor-overlay').style.display = 'none';
        }

        function switchLang(lang) {
            // Save current fields back to data before switching
            saveTempFields();

            currentLang = lang;
            const guide = currentGuideId === 'new' ? tempNewGuide : guidesData.find(g => g.id === currentGuideId);
            updateUIWithGuide(guide);
        }

        let tempNewGuide = null;

        function saveTempFields() {
            const guide = currentGuideId === 'new' ? tempNewGuide : guidesData.find(g => g.id === currentGuideId);
            if (!guide) return;
            guide[currentLang].title = document.getElementById('edit-title').value;
            guide[currentLang].desc = document.getElementById('edit-desc').value;
            guide[currentLang].image = document.getElementById('edit-image').value;
            guide[currentLang].content = document.getElementById('edit-content').value;
            guide[currentLang].tags = document.getElementById('edit-tags').value.split(',').map(t => t.trim()).filter(t => t !== '');
            // Also update global tags for backward compatibility/fallback
            guide.tags = guide[currentLang].tags; 
        }

        function openEditor(id) {
            currentGuideId = id;
            if (id === 'new') {
                const nextId = guidesData.length > 0 ? Math.max(...guidesData.map(g => g.id)) + 1 : 1;
                tempNewGuide = {
                    id: nextId,
                    tags: ["#New"],
                    ko: { title: "", desc: "", content: "" },
                    en: { title: "", desc: "", content: "" },
                    ja: { title: "", desc: "", content: "" }
                };
                document.getElementById('editor-title').innerText = `Create New Guide #${nextId}`;
                currentLang = 'ko';
                updateUIWithGuide(tempNewGuide);
            } else {
                const guide = guidesData.find(g => g.id === id);
                document.getElementById('editor-title').innerText = `Editing Guide #${id}`;
                currentLang = 'ko';
                updateUIWithGuide(guide);
            }
            document.getElementById('editor-overlay').style.display = 'flex';
        }

        async function saveGuide() {
            saveTempFields();
            
            if (currentGuideId === 'new') {
                guidesData.push(tempNewGuide);
            }

            try {
                const res = await fetch('/api/guides', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(guidesData)
                });

                if (res.ok) {
                    showToast();
                    closeEditor();
                    renderGrid();
                }
            } catch (e) {
                alert('Failed to save data. Check console.');
            }
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        fetchGuides();
    </script>
</body>
</html>
